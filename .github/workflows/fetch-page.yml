name: Fetch Page
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch'
        required: true
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch URL
        run: |
          curl -L -o page.html "${{ github.event.inputs.url }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fetched_page
          path: page.html
