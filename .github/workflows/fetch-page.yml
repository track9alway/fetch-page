name: Fetch Page & Save to Repo

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch'
        required: true
        type: string

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # اجازه commit به ریپازیتوری
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # توکن پیش‌فرض (دسترسی write دارد اگر permissions داده شود)

      - name: Fetch page with curl
        run: |
          URL="${{ github.event.inputs.url }}"
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          # ساخت نام فایل منحصربفرد از URL + timestamp
          SAFE_NAME=$(echo "$URL" | sha256sum | cut -c1-12)
          FILENAME="fetched_${TIMESTAMP}_${SAFE_NAME}.html"
          mkdir -p fetched_pages
          curl -L -k -A "Mozilla/5.0" -o "fetched_pages/$FILENAME" --max-time 60 "$URL" || echo "<html><body><h1>Error fetching</h1></body></html>" > "fetched_pages/$FILENAME"
          echo "FILE_NAME=$FILENAME" >> $GITHUB_ENV
          echo "FILE_PATH=fetched_pages/$FILENAME" >> $GITHUB_ENV

      - name: Create link file (for Tkinter)
        run: |
          # لینک نسخه raw (برای دانلود مستقیم)
          RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/${FILE_PATH}"
          echo "$RAW_URL" > link.txt
          # همچنین متادیتا ذخیره کن
          cat > metadata.json <<EOF
          {
            "original_url": "${{ github.event.inputs.url }}",
            "saved_file": "$FILE_PATH",
            "raw_link": "$RAW_URL",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fetched_pages/ link.txt metadata.json
          git diff --staged --quiet || git commit -m "Add fetched page from ${{ github.event.inputs.url }}"
          git push

      - name: Upload artifacts (for Tkinter app)
        uses: actions/upload-artifact@v4
        with:
          name: fetched_page
          path: |
            fetched_pages/*.html
            link.txt
            metadata.json
