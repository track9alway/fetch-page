name: Fetch Full Page & Save to Repo (ZIP)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch (full page with all assets)'
        required: true
        type: string
      wait_until:
        description: 'Playwright waitUntil condition (default: networkidle)'
        required: false
        default: 'networkidle'
        type: string
      extra_wait:
        description: 'Extra seconds to wait after page load (for dynamic content)'
        required: false
        default: '2'
        type: string

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies for Playwright
        run: |
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: Fetch & save page (resilient)
        run: |
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth cheerio archiver
          node -e "
          const { chromium } = require('playwright-extra');
          const stealth = require('puppeteer-extra-plugin-stealth')();
          chromium.use(stealth);
          const fs = require('fs');
          const path = require('path');
          const archiver = require('archiver');
          const cheerio = require('cheerio');

          const URL = process.env.INPUT_URL;
          const WAIT_UNTIL = process.env.INPUT_WAIT_UNTIL || 'networkidle';
          const EXTRA_WAIT = parseInt(process.env.INPUT_EXTRA_WAIT || '2', 10);
          const TIMESTAMP = new Date().toISOString().replace(/[:.]/g, '-');
          const DIR_NAME = 'fetched_' + TIMESTAMP;
          const BASE_PATH = path.join('fetched_pages', DIR_NAME);

          fs.mkdirSync(BASE_PATH, { recursive: true });

          // ** تضمین وجود حداقل یک فایل **
          let finalHtml = '<html><body><h1>Page fetch failed</h1><p>See logs for details.</p></body></html>';
          let assetBuffers = new Map();

          // --- متادیتای خود پوشه (حتماً ساخته شود) ---
          const metadata = {
            original_url: URL,
            timestamp: new Date().toISOString(),
            status: 'failed'
          };
          const writeMetadata = () => {
            fs.writeFileSync(path.join(BASE_PATH, 'metadata.json'), JSON.stringify(metadata, null, 2));
          };

          try {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
            });
            const page = await context.newPage();

            // جمع‌آوری پاسخ‌ها
            page.on('response', async response => {
              try {
                const buffer = await response.body();
                assetBuffers.set(response.url(), buffer);
              } catch (_) {}
            });

            try {
              await page.goto(URL, { waitUntil: WAIT_UNTIL, timeout: 90000 });
              if (EXTRA_WAIT > 0) await page.waitForTimeout(EXTRA_WAIT * 1000);
              finalHtml = await page.content();
              metadata.status = 'success';
            } catch (gotoErr) {
              metadata.error = gotoErr.message;
              // حتی اگر goto خطا بده، سعی می‌کنیم HTML فعلی را بگیریم
              try { finalHtml = await page.content(); } catch (_) {}
            }

            await browser.close();
          } catch (launchErr) {
            metadata.error = 'Browser launch failed: ' + launchErr.message;
          }

          // ** همیشه index.html را بنویس (حتی اگر خالی یا خطا) **
          fs.writeFileSync(path.join(BASE_PATH, 'index.html'), finalHtml);

          // ذخیره‌سازی assetها و بازنویسی (فقط اگر asset داریم)
          if (assetBuffers.size > 0) {
            const resourceDir = path.join(BASE_PATH, 'resources');
            fs.mkdirSync(resourceDir, { recursive: true });
            const linkMap = new Map();

            for (const [url, buffer] of assetBuffers) {
              try {
                const parsed = new URL(url);
                let safeName = parsed.pathname.replace(/[<>:\"|?*\\r\\n]/g, '_');
                if (!safeName || safeName === '/') safeName = '/index';
                if (parsed.search) safeName += parsed.search.replace(/[<>:\"|?*\\r\\n]/g, '_');
                if (safeName.startsWith('/')) safeName = safeName.slice(1);
                const outPath = path.join(resourceDir, safeName);
                fs.mkdirSync(path.dirname(outPath), { recursive: true });
                fs.writeFileSync(outPath, buffer);
                linkMap.set(url, './resources/' + safeName.replace(/\\/g, '/'));
              } catch (_) {}
            }

            // بازنویسی HTML با Cheerio
            if (linkMap.size > 0) {
              const $ = cheerio.load(finalHtml);
              $('[src]').each((i, el) => {
                const src = $(el).attr('src');
                if (src && linkMap.has(src)) $(el).attr('src', linkMap.get(src));
              });
              $('[href]').each((i, el) => {
                const href = $(el).attr('href');
                if (href && linkMap.has(href)) $(el).attr('href', linkMap.get(href));
              });
              $('[srcset]').each((i, el) => {
                const srcset = $(el).attr('srcset');
                if (srcset) {
                  const parts = srcset.split(',').map(p => {
                    const [u, ...r] = p.trim().split(/\s+/);
                    if (u && linkMap.has(u)) return linkMap.get(u) + (r.length ? ' ' + r.join(' ') : '');
                    return p.trim();
                  });
                  $(el).attr('srcset', parts.join(', '));
                }
              });
              finalHtml = $.html();
              fs.writeFileSync(path.join(BASE_PATH, 'index.html'), finalHtml);
            }
          }

          // نوشتن متادیتا داخل پوشه (همیشه حتی در خطا)
          writeMetadata();

          // زیپ کردن (ضد خطا)
          let zipPath = '';
          try {
            const outputZip = BASE_PATH + '.zip';
            const output = fs.createWriteStream(outputZip);
            const archive = archiver('zip', { zlib: { level: 9 } });
            archive.pipe(output);
            archive.directory(BASE_PATH, DIR_NAME);
            await archive.finalize();
            zipPath = outputZip;
            console.log('Zip created:', outputZip);
          } catch (e) {
            console.warn('Zip failed, will upload folder directly:', e.message);
          }

          // چاپ متغیرها برای مراحل بعدی
          console.log('DIR_NAME=' + DIR_NAME);
          console.log('ZIP_PATH=' + (zipPath || ''));
          " 2>&1 | tee script-output.log

      - name: Export environment variables
        run: |
          DIR_NAME=$(grep 'DIR_NAME=' script-output.log | head -1 | cut -d '=' -f2)
          ZIP_PATH=$(grep 'ZIP_PATH=' script-output.log | head -1 | cut -d '=' -f2)
          echo "DIR_NAME=$DIR_NAME" >> $GITHUB_ENV
          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV
          echo "Folder: fetched_pages/$DIR_NAME"

      - name: Commit and push (folder + repo metadata)
        if: always()
        run: |
          # ساختن metadata.json در ریشه (اختیاری برای لاگ)
          cat > metadata.json <<EOF
          {
            "original_url": "${{ github.event.inputs.url }}",
            "directory": "fetched_pages/${{ env.DIR_NAME }}",
            "zip": "${{ env.ZIP_PATH }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fetched_pages/ metadata.json
          git diff --staged --quiet || git commit -m "Add page snapshot from ${{ github.event.inputs.url }}"
          git push

      - name: Upload artifact (ZIP if exists, else folder)
        if: always() && env.DIR_NAME != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIR_NAME }}
          path: ${{ env.ZIP_PATH != '' && env.ZIP_PATH || format('fetched_pages/{0}', env.DIR_NAME) }}
