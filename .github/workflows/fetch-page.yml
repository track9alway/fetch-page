name: Fetch Web Page via GitHub

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس صفحه مورد نظر (مثلاً https://example.com)'
        required: true
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: آماده‌سازی پوشه
        run: mkdir -p fetched_content

      - name: دانلود صفحه با curl
        run: |
          curl -L -o fetched_content/page.html "${{ github.event.inputs.url }}"
          curl -L -I "${{ github.event.inputs.url }}" > fetched_content/headers.txt

      - name: آپلود آرتیفکت
        uses: actions/upload-artifact@v4
        with:
          name: fetched_page
          path: fetched_content/
