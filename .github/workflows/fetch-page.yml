name: Fetch Full Page & Index

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch'
        required: true
        type: string

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare directory and fetch page with wget
        id: fetcher
        run: |
          URL="${{ github.event.inputs.url }}"
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          SAFE_NAME=$(echo "$URL" | sha256sum | cut -c1-12)
          DIR_NAME="fetched_${TIMESTAMP}_${SAFE_NAME}"
          BASE_PATH="fetched_pages/$DIR_NAME"

          mkdir -p "$BASE_PATH"

          # دانلود کامل صفحه با منابع
          wget \
            --recursive \
            --level=1 \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --no-host-directories \
            --no-check-certificate \
            --timeout=30 \
            --tries=2 \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --restrict-file-names=nocontrol \
            --directory-prefix="$BASE_PATH" \
            -e robots=off \
            "$URL"

          # پیدا کردن فایل HTML اصلی
          MAIN_HTML=$(find "$BASE_PATH" -maxdepth 1 -name '*.html' -type f | head -1)
          if [ -z "$MAIN_HTML" ]; then
            MAIN_HTML=$(find "$BASE_PATH" -name '*.html' -type f | head -1)
          fi
          if [ -z "$MAIN_HTML" ]; then
            echo "Error: No HTML found"
            exit 1
          fi

          MAIN_REL_PATH=$(realpath --relative-to="$PWD" "$MAIN_HTML")
          RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/$MAIN_REL_PATH"

          echo "main_file=$MAIN_REL_PATH" >> $GITHUB_OUTPUT
          echo "raw_url=$RAW_URL" >> $GITHUB_OUTPUT
          echo "dir_name=$DIR_NAME" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Update index.json
        run: |
          # اگر index.json وجود نداشت، یک آرایه‌ی جدید بساز
          if [ ! -f index.json ]; then
            echo '[]' > index.json
          fi

          NEW_ENTRY=$(jq -n --arg url "${{ github.event.inputs.url }}" \
                            --arg main_file "${{ steps.fetcher.outputs.main_file }}" \
                            --arg raw_url "${{ steps.fetcher.outputs.raw_url }}" \
                            --arg dir_name "${{ steps.fetcher.outputs.dir_name }}" \
                            --arg ts "${{ steps.fetcher.outputs.timestamp }}" \
            '{original_url: $url, main_file: $main_file, raw_url: $raw_url, dir: $dir_name, timestamp: $ts}')

          # به‌روزرسانی فایل: حذف ورودی قدیمی با همان original_url (اگر بود) و افزودن جدید
          UPDATED=$(jq --argjson entry "$NEW_ENTRY" --arg url "${{ github.event.inputs.url }}" \
            'map(select(.original_url != $url)) + [$entry]' index.json)
          echo "$UPDATED" > index.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fetched_pages/ index.json
          git diff --staged --quiet || git commit -m "Save page: ${{ github.event.inputs.url }}"
          git push
