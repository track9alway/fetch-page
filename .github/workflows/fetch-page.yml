name: Fetch Full Page & Save to Repo (ZIP)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch (full page with all assets)'
        required: true
        type: string
      wait_until:
        description: 'Playwright waitUntil condition'
        required: false
        default: 'networkidle'
        type: string
      extra_wait:
        description: 'Extra seconds to wait after page load'
        required: false
        default: '2'
        type: string

permissions:
  contents: write

jobs:
  fetch-full-page:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4
          playwright install chromium

      - name: Run fetch script
        id: fetch
        env:
          FETCH_URL: ${{ github.event.inputs.url }}
          WAIT_UNTIL: ${{ github.event.inputs.wait_until }}
          EXTRA_WAIT: ${{ github.event.inputs.extra_wait }}
        run: |
          python scripts/fetch_full_page.py
          echo "ZIP_PATH=$(cat zip_path.txt)" >> $GITHUB_OUTPUT
          echo "SNAPSHOT_DIR=$(cat snapshot_dir.txt)" >> $GITHUB_OUTPUT

      - name: Commit and push ZIP snapshot
        if: success() && steps.fetch.outputs.ZIP_PATH != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.fetch.outputs.ZIP_PATH }}"
          git diff --staged --quiet || git commit -m "Snapshot of ${{ github.event.inputs.url }} at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push

      - name: Upload ZIP as artifact
        if: success() && steps.fetch.outputs.ZIP_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: page_full_${{ github.run_id }}
          path: ${{ steps.fetch.outputs.ZIP_PATH }}
